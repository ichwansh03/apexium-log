spring.application.name=sfdc

# Salesforce Configuration
# Use environment variables for sensitive data to keep the repository public-safe
salesforce.login-url=https://axaid-ccc--sbrlsdmtm.sandbox.my.salesforce.com
salesforce.client-id=${SALESFORCE_CLIENT_ID}
salesforce.client-secret=${SALESFORCE_CLIENT_SECRET}
salesforce.grant-type=client_credentials
salesforce.api-version=v61.0

# Database Configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:sfdc_logs}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Redis Configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
# spring.data.redis.password=
spring.cache.type=redis
# Cache TTL configurations (custom property we might use in config class)
cache.ttl.token=3600
cache.ttl.metadata=3600
cache.ttl.logs=86400

