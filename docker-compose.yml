services:
  app:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=sfdc_logs
      - DB_USER=postgres
      - DB_PASSWORD=postgres
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - sfdc-network

  db:
    image: postgres:17
    environment:
      - POSTGRES_DB=sfdc_logs
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sfdc-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sfdc_logs"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - sfdc-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  sfdc-network:
    driver: bridge

volumes:
  postgres_data:
